<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>YT Archiver</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
    <div class="brand"><span class="logo">⬇</span> YT Archiver</div>
</header>

<main>
    <section id="home" class="page active">
        <h2 class="shelf-title" id="continue-title" hidden>Continue watching</h2>
        <div class="row" id="continue-row"></div>
        <h2 class="shelf-title">Library</h2>
        <div class="grid" id="library-grid"></div>
        <div class="empty" id="library-empty" hidden>No downloads yet.</div>
    </section>

    <section id="playlists" class="page">
        <div id="playlists-list"></div>
        <div class="empty" id="playlists-empty" hidden>No playlists yet.</div>
    </section>

    <section id="download" class="page">
        <div class="dl">
            <input id="dl-url" type="text" placeholder="Paste a YouTube video, playlist or music URL">
            <div class="dl-actions">
                <button class="btn primary" onclick="submitDownload('video')">Download Video</button>
                <button class="btn" onclick="submitDownload('music')">Download Music</button>
            </div>
            <div id="dl-status" class="dl-status"></div>
            <h3>Queue</h3>
            <div id="queue-list" class="queue"></div>
        </div>
    </section>
</main>

<nav id="bottom-nav">
    <button class="nav active" data-tab="home"><span class="ic">🏠</span><span>Home</span></button>
    <button class="nav" data-tab="playlists"><span class="ic">☰</span><span>Playlists</span></button>
    <button class="nav" data-tab="download"><span class="ic">⬇</span><span>Download</span></button>
</nav>

<div id="overlay" class="overlay hidden">
    <div class="player">
        <div class="player-top">
            <button class="close" onclick="closePlayer()">✕</button>
            <div id="player-title" class="ptitle"></div>
        </div>
        <div id="player-media"></div>
        <div id="player-controls" class="pcontrols"></div>
        <div id="player-up-next" class="up-next"></div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
